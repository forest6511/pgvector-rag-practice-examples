# PostgreSQL 17 設定ファイル(本書標準値)
# ベンチマーク測定環境: AWS EC2 c6i.xlarge(4 vCPU / 8 GB RAM)
# docs/benchmark-policy.md と docs/versions.md の値と同期させる

# --- Connection ---
listen_addresses = '*'
port = 5432
max_connections = 100

# --- Memory(8 GB RAM を前提) ---
shared_buffers = 2GB              # RAM の 25%
effective_cache_size = 6GB        # RAM の 75%
maintenance_work_mem = 1GB        # HNSW 構築時の必要量
work_mem = 16MB                   # クエリ中のソート/ハッシュ
temp_buffers = 32MB

# --- Parallelism ---
max_parallel_workers = 4          # vCPU 数
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# --- Storage(gp3 SSD 前提) ---
random_page_cost = 1.1
effective_io_concurrency = 200
wal_compression = on

# --- Logging(pg_stat_statements 併用想定) ---
shared_preload_libraries = 'pg_stat_statements'
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 100
log_line_prefix = '%m [%p] %q%u@%d '

# --- Statistics ---
track_io_timing = on
track_functions = pl
