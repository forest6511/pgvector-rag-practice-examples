[databases]
ragdb_rw = host=primary.internal port=5432 dbname=ragdb
ragdb_ro = host=standby.internal port=5432 dbname=ragdb

[pgbouncer]
listen_addr = *
listen_port = 6432
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 5
server_idle_timeout = 300
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
